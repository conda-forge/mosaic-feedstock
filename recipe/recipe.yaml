schema_version: 1

context:
  name: mosaic
  version: "1.3.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/E3SM-Project/mosaic/archive/${{ version }}.tar.gz
  sha256: 7d8aa7db1c92af425653179652c1feb825ceab89d896cbc8ea784b06a414046d

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=60
  run:
    - python >=${{ python_min }}
    - cartopy <=0.24.0
    - cmocean
    - h5netcdf
    - netcdf4
    - matplotlib-base
    - numpy
    - pooch
    - pyproj
    - scipy
    - shapely
    - tqdm
    - xarray

tests:
  - python:
      imports:
        - mosaic
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pytest
        - pytest-timeout
        - networkx
        - hypothesis
    files:
      source:
        - tests/
    script:
      - pytest tests/

about:
  summary: Graphics package for MPAS meshes
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/E3SM-Project/mosaic/
  repository: https://github.com/E3SM-Project/mosaic/
  documentation: https://docs.e3sm.org/mosaic/

extra:
  recipe-maintainers:
    - andrewdnolan
    - xylar
